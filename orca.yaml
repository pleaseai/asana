# orca.yaml — Orca worktree 생성 시 실행되는 setup 스크립트
# Orca(병렬 에이전트용 worktree-네이티브 IDE)가 새 worktree를 만들 때 scripts.setup 을 실행한다.
# 추적(committed)되는 파일이라 팀 전체가 공유한다. 상세: Skill("standards:dev-tooling")
# 레퍼런스: https://github.com/chatbot-pf/engineering-standards/blob/main/orca.yaml
#
# 주입 환경 변수:
#   $ORCA_ROOT_PATH     — 메인 체크아웃(루트 저장소) 경로 (gitignored 로컬 파일 복사 원본)
#   $ORCA_WORKTREE_PATH — 새로 생성된 worktree 경로 (복사 대상, setup 실행 디렉터리)

scripts:
  setup: |
    set -e
    # 1. 새 worktree 의 mise.toml 신뢰 (trust 는 경로별 — 미실행 시 "Config files not trusted" 로 gradle/flutter 실패)
    mise trust --quiet
    # 2. mise.toml 의 도구(java/gradle/flutter/bun) 설치 — bun 도 [tools] 에 선언돼 여기서 함께 provisioning 됨
    mise install
    # 3. gitignored 로컬 파일(.env, .claude/settings.local.json, Firebase 시크릿 등)을 메인 체크아웃 → worktree 로 복사
    #    `mise exec -- bunx` 로 호출해 host PATH 의 bun 유무와 무관하게 mise 가 설치한 bun 을 사용 (#466 gemini 리뷰 반영)
    mise exec -- bunx @pleaseai/worktreeinclude "$ORCA_ROOT_PATH" "$ORCA_WORKTREE_PATH"
