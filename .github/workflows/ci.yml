name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup mise (node + bun)
        uses: jdx/mise-action@v2

      - name: Install dependencies
        run: bun install

      - name: Run tests
        run: bun test test/

      - name: Generate coverage report
        run: bun test test/ --coverage

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: unit-tests
        continue-on-error: true

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup mise (node + bun)
        uses: jdx/mise-action@v2

      - name: Install dependencies
        run: bun install

      - name: Build binary
        run: bun run build

      - name: Verify build output
        shell: bash
        run: |
          if [ ! -f asana ]; then
            echo "Build failed: asana binary not found"
            exit 1
          fi
          chmod +x asana
          ./asana --version

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup mise (node + bun)
        uses: jdx/mise-action@v2

      - name: Install dependencies
        run: bun install

      - name: Run ESLint
        run: bun run lint

  link-check:
    name: Markdown Link Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup mise (node + markdown-link-check)
        uses: jdx/mise-action@v2

      # Reuse the same hk.pkl globs/excludes as the local pre-commit hook so the
      # check is identical everywhere. hk isn't in mise.toml [tools] (no Intel-Mac
      # binary), so install it on the fly here (CI runs linux).
      - name: Check markdown links
        run: mise exec hk@1.48.0 -- hk check --all
