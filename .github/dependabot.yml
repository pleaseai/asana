# Dependabot configuration
# Docs: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-reference
version: 2
updates:
  # Bun dependencies (package.json / bun.lock)
  - package-ecosystem: bun
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    commit-message:
      prefix: chore
      include: scope
    groups:
      # Group non-major dev/runtime dependency bumps into a single PR
      minor-and-patch:
        update-types:
          - minor
          - patch

  # Bun dependencies for the docs sub-package (docs/package.json / docs/bun.lock)
  - package-ecosystem: bun
    directory: /docs
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    commit-message:
      prefix: chore
      include: scope
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch

  # GitHub Actions used in .github/workflows
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    commit-message:
      prefix: ci
      include: scope
    groups:
      actions:
        update-types:
          - minor
          - patch
